<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Cuentas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Segoe UI;background:#f5f7fa}
.hidden{display:none}
button{padding:8px 14px;border:0;background:#4a6ee0;color:#fff;border-radius:5px}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #ddd}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>
<button id="btnLogin">Ingresar</button>
<p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
<h2>Usuarios</h2>
<button id="btnLogout">Cerrar sesión</button>
<button id="btnReload">Actualizar</button>

<table>
<thead><tr><th>Email</th><th>Nombre</th><th>Rol</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<h3>Crear Usuario</h3>
<input id="uemail" placeholder="Email">
<input id="uname" placeholder="Nombre">
<input id="upass" placeholder="Password">
<select id="urole">
<option value="tecnico">Tecnico</option>
<option value="admin">Admin</option>
</select>
<button id="btnCreate">Crear</button>
<p id="adminMsg"></p>
</div>

<script>
const SUPABASE_URL = "https://fdmyrrlxnrxlfyzjcvvm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkbXlycmx4bnJ4bGZ5empjdnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMzMTAxNTcsImV4cCI6MjA2ODg4NjE1N30.6InJE9-kHu1UrRiUzYl-AQ49vJJtXNKVP3DranJ8a2M";

// ⚠️ NO usar const supabase = supabase...
const client = window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const loginDiv = document.getElementById("login");
const panelDiv = document.getElementById("panel");

document.getElementById("btnLogin").addEventListener("click",login);
document.getElementById("btnLogout").addEventListener("click",logout);
document.getElementById("btnReload").addEventListener("click",loadUsers);
document.getElementById("btnCreate").addEventListener("click",createUser);

async function login(){
 const {error} = await client.auth.signInWithPassword({
   email:email.value,password:password.value
 });
 if(error){loginMsg.innerText=error.message;return;}
 checkRole();
}

async function logout(){
 await client.auth.signOut();
 panelDiv.classList.add("hidden");
 loginDiv.classList.remove("hidden");
}

async function checkRole(){
 const {data:{user}} = await client.auth.getUser();
 if(!user)return;

 const {data} = await client.from("user_profiles").select("role").eq("id",user.id).single();
 if(data.role!=="admin"){loginMsg.innerText="No autorizado";return;}

 loginDiv.classList.add("hidden");
 panelDiv.classList.remove("hidden");
 loadUsers();
}

async function loadUsers(){
 const {data,error}=await client.from("admin_users_view").select("*");
 if(error){adminMsg.innerText=error.message;return;}
 tbody.innerHTML=data.map(u=>`
 <tr><td>${u.email}</td><td>${u.full_name||""}</td><td>${u.role}</td></tr>
 `).join("");
}

async function createUser(){
 const {error}=await client.rpc("create_user_admin",{
  p_email:uemail.value,
  p_password:upass.value,
  p_full_name:uname.value,
  p_role:urole.value
 });
 if(error){adminMsg.innerText=error.message;return;}
 adminMsg.innerText="Usuario creado";
 loadUsers();
}

checkRole();
</script>
</body>
</html>
