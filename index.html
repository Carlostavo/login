<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Usuarios</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Segoe UI;background:#f5f7fa}
.container{max-width:1100px;margin:auto;padding:20px}
.hidden{display:none}
button{padding:8px 14px;border:0;background:#4a6ee0;color:#fff;border-radius:5px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border-bottom:1px solid #ddd}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Ingresar</button>
<p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
<h2>Usuarios</h2>
<button onclick="logout()">Cerrar sesión</button>
<button onclick="loadUsers()">Actualizar</button>
<table>
<thead>
<tr><th>Email</th><th>Nombre</th><th>Rol</th><th>Creado</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3>Crear Usuario</h3>
<input id="uemail" placeholder="Email">
<input id="uname" placeholder="Nombre">
<input id="upass" placeholder="Password">
<select id="urole">
<option value="tecnico">Tecnico</option>
<option value="admin">Admin</option>
</select>
<button onclick="createUser()">Crear</button>
<p id="adminMsg"></p>
</div>

<script>
const SUPABASE_URL = "https://fdmyrrlxnrxlfyzjcvvm.supabase.co";
const SUPABASE_ANON_KEY = "TU_ANON_KEY_REAL";
const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function login(){
 const {error} = await supabase.auth.signInWithPassword({
  email:email.value,password:password.value
 });
 if(error){loginMsg.innerText=error.message;return;}
 checkRole();
}

async function logout(){
 await supabase.auth.signOut();
 panel.classList.add("hidden");
 login.classList.remove("hidden");
}

async function checkRole(){
 const {data:{user}} = await supabase.auth.getUser();
 if(!user)return;
 const {data} = await supabase.from("user_profiles").select("role").eq("id",user.id).single();
 if(data.role!=="admin"){loginMsg.innerText="No autorizado";return;}
 login.classList.add("hidden");
 panel.classList.remove("hidden");
 loadUsers();
}

async function loadUsers(){
 const {data,error}=await supabase.from("admin_users_view").select("*");
 if(error){adminMsg.innerText=error.message;return;}
 tbody.innerHTML=data.map(u=>`
 <tr><td>${u.email}</td><td>${u.full_name||""}</td><td>${u.role}</td><td>${u.created_at}</td></tr>
 `).join("");
}

async function createUser(){
 const {error}=await supabase.rpc("create_user_admin",{
  p_email:uemail.value,
  p_password:upass.value,
  p_full_name:uname.value,
  p_role:urole.value
 });
 if(error){adminMsg.innerText=error.message;return;}
 adminMsg.innerText="Usuario creado";
 loadUsers();
}

checkRole();
</script>
</body>
</html>
